<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pilih Kelas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Pilih Kelas</h2>

<!-- LIST KELAS -->
<div class="kelas-list">

  <button onclick="bukaPin(1, 'RPL 1')">X RPL 1</button>
  <button onclick="bukaPin(2, 'RPL 2')">X RPL 2</button>
  <button onclick="bukaPin(3, 'RPL 3')">X RPL 3</button>

</div>

<!-- MODAL PIN -->
<div id="modal-pin" class="modal-bg">

  <div class="modal-content">
    
    <h3 id="pin-judul">Masuk Kelas</h3>

    <!-- DOT PIN -->
    <div class="pin-dots">
      <span id="d1" class="pin-dot"></span>
      <span id="d2" class="pin-dot"></span>></span>
      <span id="d3" class="pin-dot"></span>></span>
      <span id="d4" class="pin-dot"></span>></span>
    </div>

    <!-- ERROR -->
    <div id="pin-error" style="color:red; margin-top:10px;"></div>

    <!-- KEYPAD -->
    <div class="numpad">
      <button class="numpad-btn" onclick="pinAngka(1)">1</button>
      <button class="numpad-btn" onclick="pinAngka(2)">2</button>
      <button class="numpad-btn" onclick="pinAngka(3)">3</button>

      <button class="numpad-btn" onclick="pinAngka(4)">4</button>
      <button class="numpad-btn" onclick="pinAngka(5)">5</button>
      <button class="numpad-btn" onclick="pinAngka(6)">6</button>

      <button class="numpad-btn" onclick="pinAngka(7)">7</button>
      <button class="numpad-btn" onclick="pinAngka(8)">8</button>
      <button class="numpad-btn" onclick="pinAngka(9)">9</button>

      <button class="numpad-btn" onclick="tutupPin()">❌</button>
      <button class="numpad-btn" onclick="pinAngka(0)">0</button>
      <button class="numpad-btn" onclick="pinHapus()">⌫</button>
    </div>

  </div>

</div>

<script src="pin.js"></script>

</body>
</html>
